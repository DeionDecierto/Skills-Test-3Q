<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameFinder Registration</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>


body{
background-color:#0f172a;
font-family:Arial, Helvetica, sans-serif;
color:white;
height:100vh;
}



.navbar{
background:#020617;
}

.navbar a{
color:white;
margin-right:15px;
text-decoration:none;
}


.form-container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:420px;
margin:auto;
margin-top:80px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}


.profile-pic{
width:120px;
border-radius:50%;
display:block;
margin:auto;
margin-bottom:10px;
}


.btn-primary{
background:#06b6d4;
border:none;
}

.btn-primary:hover{
background:#0891b2;
}

footer{
text-align:center;
margin-top:30px;
font-size:13px;
color:white;
}

</style>

</head>

<body>


<nav class="navbar navbar-expand-lg px-4">
<a class="navbar-brand text-white">GameFinder</a>

<div class="ms-auto">
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Help</a>
<a href="#" class="btn btn-primary btn-sm">Create Account</a>
</div>
</nav>



<div class="form-container">

<h3 class="text-center">REGISTRATION</h3>

<p class="text-center">
Fill out the form to create your GameFinder account.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic">

<div class="mb-2">
<label>First Name</label>
<input type="text" class="form-control" id="fname">
</div>

<div class="mb-2">
<label>Last Name</label>
<input type="text" class="form-control" id="lname">
</div>

<div class="mb-2">
<label>Email</label>
<input type="email" class="form-control" id="email">
</div>

<div class="mb-2">
<label>Username</label>
<input type="text" class="form-control" id="username">
</div>

<div class="mb-2">
<label>Password</label>
<input type="password" class="form-control" id="password">
</div>

<div class="mb-3">
<label>Upload Profile Photo</label>
<input type="file" class="form-control">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
I accept the Terms and Privacy Policy
</label>
</div>

<button class="btn btn-primary w-100" onclick="createAccount()">
Create my account
</button>

<button class="btn btn-secondary w-100 mt-2">
Cancel
</button>

</div>


<footer>
Deion Gil N. Decierto III | 9 - Emerald | ©2026
</footer>


<script>


function createAccount(){

let fname = document.getElementById("fname").value;

if(fname == ""){
alert("Please enter your first name.");
}

else{
alert("Account successfully created!");
}

}

</script>


</body>
</html>
